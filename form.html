<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="WDD 131 Product Review Form assignment by Edgar Garcia Morado.">
    <meta name="author" content="Edgar Garcia Morado">
    <title>Product Review Form | WDD 131</title>
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>

<body>
    <header>
        <h1>Product Review</h1>
    </header>

    <main>
        <form method="get" action="review.html">
            <label for="productName">
                Product Name <span class="required">(required)</span>
            </label>
            <select id="productName" name="productName" required>
                <option value="" disabled selected>Select a Product ...</option>
            </select>

            <fieldset>
                <legend>Overall Rating <span class="required">(required)</span></legend>

                <div class="rating">
                    <label for="rating1">
                        <span>☆</span>
                        <input type="radio" id="rating1" name="rating" value="1" required>
                    </label>

                    <label for="rating2">
                        <span>☆☆</span>
                        <input type="radio" id="rating2" name="rating" value="2" required>
                    </label>

                    <label for="rating3">
                        <span>☆☆☆</span>
                        <input type="radio" id="rating3" name="rating" value="3" required>
                    </label>

                    <label for="rating4">
                        <span>☆☆☆☆</span>
                        <input type="radio" id="rating4" name="rating" value="4" required>
                    </label>

                    <label for="rating5">
                        <span>☆☆☆☆☆</span>
                        <input type="radio" id="rating5" name="rating" value="5" required>
                    </label>
                </div>
            </fieldset>

            <label for="installDate">
                Date of Installation <span class="required">(required)</span>
            </label>
            <input type="date" id="installDate" name="installDate" required>

            <fieldset>
                <legend>Useful Features <span class="optional">(check all that apply)</span></legend>

                <div class="checkbox-group">
                    <label for="durability">
                        <input type="checkbox" id="durability" name="features" value="durability">
                        Durability
                    </label>

                    <label for="ease">
                        <input type="checkbox" id="ease" name="features" value="ease-of-use">
                        Ease of Use
                    </label>

                    <label for="performance">
                        <input type="checkbox" id="performance" name="features" value="performance">
                        Performance
                    </label>

                    <label for="design">
                        <input type="checkbox" id="design" name="features" value="design">
                        Design
                    </label>
                </div>
            </fieldset>

            <label for="review">Written Review <span class="optional">(optional)</span></label>
            <textarea id="review" name="review" rows="5"
                placeholder="Share your experience with this product..."></textarea>

            <label for="userName">Your Name <span class="optional">(optional)</span></label>
            <input type="text" id="userName" name="userName" autocomplete="name">

            <input type="submit" value="Submit Review">
        </form>
    </main>

    <footer>
        <p>&copy;<span id="currentyear"></span> | Edgar Garcia Morado | Mexico</p>
        <p id="lastModified"></p>
    </footer>
</body>

</html>
